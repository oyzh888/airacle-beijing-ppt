<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airacle - 公司介绍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Background layers -->
<canvas id="bgCanvas"></canvas>
<div class="slide-bg-layer" id="slideBgLayer"></div>
<div class="noise"></div>
<div class="floating-text-layer" id="floatingTextLayer"></div>
<div class="mesh-blob blob-1"></div>
<div class="mesh-blob blob-2"></div>
<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- Progress bar -->
<div class="progress" id="progress" style="width:0"><div class="progress-inner"></div></div>

<!-- Top bar -->
<div class="topbar">
  <div class="logo-area">
    <div class="logo-cube">
      <div class="logo-cube-face f">A</div>
      <div class="logo-cube-face b">A</div>
      <div class="logo-cube-face l">A</div>
      <div class="logo-cube-face r">A</div>
    </div>
    <div class="logo-name">AIRACLE</div>
  </div>
  <div class="topbar-right">
    <div class="slide-num"><span class="cur" id="sNum">01</span> / <span id="sTotal">08</span></div>
  </div>
</div>

<!-- Minimap -->
<div class="minimap" id="minimap"></div>

<!-- Slides — loaded dynamically from slides/*.html -->
<div class="deck" id="deck"></div>

<!-- Nav arrows -->
<button class="arrow-btn prev" id="btnPrev">&#x276E;</button>
<button class="arrow-btn next" id="btnNext">&#x276F;</button>
<div class="bottom-nav" id="bnav"></div>

<!-- Loader: fetch slide fragments, then init -->
<script>
(async function loadSlides() {
  const slideFiles = [
    'slides/01-cover.inc',
    'slides/02-company.inc',
    'slides/03-team.inc',
    'slides/04-demo-openclaw.inc',
    'slides/05-demo-tech.inc',
    'slides/06-business.inc',
    'slides/07-contribution.inc',
    'slides/08-vision.inc',
  ];

  const deck = document.getElementById('deck');

  // Fetch all slides in parallel
  const contents = await Promise.all(
    slideFiles.map(f => fetch(f).then(r => r.text()))
  );

  // Insert into DOM
  contents.forEach((html, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.dataset.i = i;
    div.innerHTML = html;
    deck.appendChild(div);
  });

  // Now init all JS modules (they depend on .slide elements existing)
  const scripts = ['js/background.js', 'js/cursor.js', 'js/deck.js'];
  for (const src of scripts) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = reject;
      document.body.appendChild(s);
    });
  }

  // Wire up arrow buttons (D is now available from deck.js)
  document.getElementById('btnPrev').onclick = () => D.go(-1);
  document.getElementById('btnNext').onclick = () => D.go(1);
})();
</script>
</body>
</html>
